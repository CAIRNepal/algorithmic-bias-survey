name: Regenerate Atlas on Paper Update

# Triggers when papers_new.csv or openalex_enriched.csv are pushed to main,
# or when triggered manually from the Actions tab.
on:
  push:
    branches: [ main ]
    paths:
      - 'evaluation/analysis/papers_new.csv'
      - 'openalex_enriched.csv'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (optional)'
        required: false
        default: 'Manual atlas regeneration'

permissions:
  contents: write   # needed to commit generated files back

concurrency:
  group: "atlas-regeneration"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a token with write access so the commit-back push triggers deploy.yml
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Python setup with pip cache ──────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '**/requirements-atlas.txt'

      # Install a pinned requirements file so the cache key is stable.
      # sentence-transformers pulls in torch, so we pin CPU-only torch to keep
      # install size and time manageable.
      - name: Create requirements file
        run: |
          cat > requirements-atlas.txt << 'EOF'
          numpy>=1.24,<2.0
          scikit-learn>=1.3
          umap-learn>=0.5
          sentence-transformers>=2.2
          torch>=2.0 --extra-index-url https://download.pytorch.org/whl/cpu
          EOF

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "numpy>=1.24,<2.0" \
            "scikit-learn>=1.3" \
            "umap-learn>=0.5" \
            "sentence-transformers>=2.2" \
            torch torchvision --extra-index-url https://download.pytorch.org/whl/cpu

      # ── Run UMAP pipeline ────────────────────────────────────────────────────
      - name: Run UMAP pipeline (generate atlas_data.csv)
        run: python generate_atlas_umap.py

      # ── Refresh papers.csv for Research Analytics page ───────────────────────
      - name: Refresh dashboard/public/papers.csv
        run: |
          python -c "
          import pandas as pd, csv
          df = pd.read_csv('evaluation/analysis/papers_new.csv')
          df.to_csv('dashboard/public/papers.csv', index=False, quoting=csv.QUOTE_ALL)
          print(f'Written {len(df)} rows to dashboard/public/papers.csv')
          "

      # ── Commit generated files back ──────────────────────────────────────────
      - name: Commit regenerated atlas files
        id: commit_step
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dashboard/public/atlas_data.csv dashboard/public/papers.csv

          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "No changes to atlas files — nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            PAPER_COUNT=$(python -c "
          import csv
          with open('evaluation/analysis/papers_new.csv') as f:
              print(sum(1 for _ in csv.DictReader(f)))
          ")
            git commit -m "chore: regenerate atlas for ${PAPER_COUNT} papers [skip ci]

          Auto-generated by update-atlas workflow.
          Source: evaluation/analysis/papers_new.csv + openalex_enriched.csv
          Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"

            git push
            echo "✅ Pushed updated atlas_data.csv and papers.csv"
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Trigger deploy ───────────────────────────────────────────────────────
      # deploy.yml skips pushes with [skip ci], so we must dispatch it explicitly
      # after committing the regenerated atlas files.
      - name: Trigger GitHub Pages deploy
        if: steps.commit_step.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Dispatching deploy.yml to publish updated atlas…"
          gh workflow run deploy.yml --ref main
          echo "✅ Deploy workflow dispatched."
