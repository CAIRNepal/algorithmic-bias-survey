name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  # Allow manual triggering (used by update-atlas.yml when atlas files change)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do NOT cancel in-progress runs so
# production deployments always complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    # Skip commits auto-generated by update-atlas (contain [skip ci]),
    # but always run for workflow_dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Automatically injects basePath into next.config.ts and sets
          # images.unoptimized = true for static export.
          static_site_generator: next
          working_directory: dashboard

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: dashboard/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('dashboard/package-lock.json') }}-${{ hashFiles('dashboard/**.[jt]s', 'dashboard/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('dashboard/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard

      - name: Build static site
        run: npx next build
        working-directory: dashboard
        env:
          NEXT_PUBLIC_BASE_PATH: /algorithmic-bias-survey

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
